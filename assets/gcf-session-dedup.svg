<svg xmlns="http://www.w3.org/2000/svg" width="960" height="820" viewBox="0 0 960 820">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <rect width="960" height="820" rx="16" fill="url(#bg)"/>
  <rect x="1" y="1" width="958" height="818" rx="15" fill="none" stroke="#334155" stroke-width="1"/>

  <!-- Title -->
  <text x="480" y="38" fill="#e2e8f0" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" text-anchor="middle">GCF Graph Profile Session Deduplication</text>
  <text x="480" y="58" fill="#64748b" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle">Same data. Three API calls. JSON retransmits everything. GCF sends only what's new.</text>

  <!-- Divider line -->
  <line x1="475" y1="75" x2="475" y2="730" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ===== LEFT COLUMN: JSON ===== -->
  <text x="235" y="92" fill="#f87171" font-family="system-ui,sans-serif" font-size="14" font-weight="700" text-anchor="middle">Without Session Dedup (JSON)</text>

  <!-- JSON Call 1: y=105 -->
  <text x="30" y="118" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Call 1</text>
  <text x="110" y="118" fill="#64748b" font-family="system-ui,sans-serif" font-size="10">(query: "show auth symbols")</text>
  <rect x="25" y="125" width="430" height="78" rx="4" fill="#1a1a2e" stroke="#475569" stroke-width="1"/>
  <text x="35" y="143" fill="#fca5a5" font-family="ui-monospace,monospace" font-size="9.5">{"qualified_name":"auth.validateToken",</text>
  <text x="35" y="156" fill="#fca5a5" font-family="ui-monospace,monospace" font-size="9.5"> "kind":"function","score":0.95,"provenance":"definition"}</text>
  <text x="35" y="172" fill="#fca5a5" font-family="ui-monospace,monospace" font-size="9.5">{"qualified_name":"auth.refreshToken",</text>
  <text x="35" y="185" fill="#fca5a5" font-family="ui-monospace,monospace" font-size="9.5"> "kind":"function","score":0.92,"provenance":"definition"}</text>
  <text x="240" y="199" fill="#64748b" font-family="ui-monospace,monospace" font-size="8" text-anchor="middle">... showing 2 of 50 symbols</text>
  <text x="445" y="143" fill="#64748b" font-family="ui-monospace,monospace" font-size="10" text-anchor="end">3,000 tok</text>

  <!-- JSON Call 2: y=215 -->
  <text x="30" y="228" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Call 2</text>
  <text x="110" y="228" fill="#64748b" font-family="system-ui,sans-serif" font-size="10">(query: "who calls revokeToken?")</text>
  <rect x="25" y="235" width="430" height="108" rx="4" fill="#1a1a2e" stroke="#475569" stroke-width="1"/>
  <text x="35" y="253" fill="#f87171" font-family="ui-monospace,monospace" font-size="9.5" opacity="0.5">{"qualified_name":"auth.validateToken",</text>
  <text x="35" y="266" fill="#f87171" font-family="ui-monospace,monospace" font-size="9.5" opacity="0.5"> "kind":"function","score":0.95,"provenance":"definition"}</text>
  <text x="445" y="266" fill="#f87171" font-family="system-ui,sans-serif" font-size="8" text-anchor="end">⬆ repeated</text>
  <text x="35" y="282" fill="#f87171" font-family="ui-monospace,monospace" font-size="9.5" opacity="0.5">{"qualified_name":"auth.refreshToken",</text>
  <text x="35" y="295" fill="#f87171" font-family="ui-monospace,monospace" font-size="9.5" opacity="0.5"> "kind":"function","score":0.92,"provenance":"definition"}</text>
  <text x="445" y="295" fill="#f87171" font-family="system-ui,sans-serif" font-size="8" text-anchor="end">⬆ repeated</text>
  <text x="35" y="311" fill="#fca5a5" font-family="ui-monospace,monospace" font-size="9.5">{"qualified_name":"auth.revokeToken",</text>
  <text x="35" y="324" fill="#fca5a5" font-family="ui-monospace,monospace" font-size="9.5"> "kind":"function","score":0.88,"provenance":"definition"}</text>
  <text x="240" y="339" fill="#64748b" font-family="ui-monospace,monospace" font-size="8" text-anchor="middle">... showing 3 of 51 symbols (50 repeated)</text>
  <text x="445" y="253" fill="#64748b" font-family="ui-monospace,monospace" font-size="10" text-anchor="end">3,000 tok</text>

  <!-- JSON Call 3: y=355 -->
  <text x="30" y="368" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Call 3</text>
  <text x="110" y="368" fill="#64748b" font-family="system-ui,sans-serif" font-size="10">(query: "show call edges")</text>
  <rect x="25" y="375" width="430" height="108" rx="4" fill="#1a1a2e" stroke="#475569" stroke-width="1"/>
  <text x="35" y="393" fill="#f87171" font-family="ui-monospace,monospace" font-size="9.5" opacity="0.4">{"qualified_name":"auth.validateToken",</text>
  <text x="35" y="406" fill="#f87171" font-family="ui-monospace,monospace" font-size="9.5" opacity="0.4"> "kind":"function","score":0.95,"provenance":"definition"}</text>
  <text x="445" y="406" fill="#f87171" font-family="system-ui,sans-serif" font-size="8" text-anchor="end">⬆ repeated</text>
  <text x="35" y="422" fill="#f87171" font-family="ui-monospace,monospace" font-size="9.5" opacity="0.4">{"qualified_name":"auth.refreshToken",</text>
  <text x="35" y="435" fill="#f87171" font-family="ui-monospace,monospace" font-size="9.5" opacity="0.4"> "kind":"function","score":0.92,"provenance":"definition"}</text>
  <text x="445" y="435" fill="#f87171" font-family="system-ui,sans-serif" font-size="8" text-anchor="end">⬆ repeated</text>
  <text x="35" y="451" fill="#f87171" font-family="ui-monospace,monospace" font-size="9.5" opacity="0.4">{"qualified_name":"auth.revokeToken",</text>
  <text x="35" y="464" fill="#f87171" font-family="ui-monospace,monospace" font-size="9.5" opacity="0.4"> "kind":"function","score":0.88,"provenance":"definition"}</text>
  <text x="445" y="464" fill="#f87171" font-family="system-ui,sans-serif" font-size="8" text-anchor="end">⬆ repeated</text>
  <text x="240" y="479" fill="#64748b" font-family="ui-monospace,monospace" font-size="8" text-anchor="middle">... showing 3 of 51 symbols (all repeated)</text>
  <text x="445" y="393" fill="#64748b" font-family="ui-monospace,monospace" font-size="10" text-anchor="end">3,000 tok</text>

  <!-- JSON Total -->
  <rect x="25" y="500" width="430" height="28" rx="4" fill="#7f1d1d" opacity="0.3"/>
  <text x="240" y="519" fill="#f87171" font-family="system-ui,sans-serif" font-size="13" font-weight="700" text-anchor="middle">Total: 9,000 tokens</text>

  <!-- ===== RIGHT COLUMN: GCF ===== -->
  <text x="715" y="92" fill="#18befc" font-family="system-ui,sans-serif" font-size="14" font-weight="700" text-anchor="middle">With GCF Graph Profile</text>

  <!-- GCF Call 1: y=105 -->
  <text x="495" y="118" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Call 1</text>
  <text x="575" y="118" fill="#67e8f9" font-family="system-ui,sans-serif" font-size="10">(full transmission)</text>
  <rect x="490" y="125" width="445" height="78" rx="4" fill="#0c2d3e" stroke="#18befc" stroke-width="1"/>
  <text x="502" y="145" fill="#67e8f9" font-family="ui-monospace,monospace" font-size="10">## symbols [50]{id,kind,qname,score,provenance}</text>
  <text x="502" y="163" fill="#e2e8f0" font-family="ui-monospace,monospace" font-size="10">@0|function|auth.validateToken|0.95|definition</text>
  <text x="502" y="181" fill="#e2e8f0" font-family="ui-monospace,monospace" font-size="10">@1|function|auth.refreshToken|0.92|definition</text>
  <text x="712" y="199" fill="#64748b" font-family="ui-monospace,monospace" font-size="8" text-anchor="middle">... showing 2 of 50 symbols</text>
  <text x="502" y="199" fill="#18befc" font-family="system-ui,sans-serif" font-size="9" opacity="0.5">↑ @0..@49 tracked</text>
  <text x="920" y="145" fill="#18befc" font-family="ui-monospace,monospace" font-size="10" text-anchor="end">1,200 tok</text>

  <!-- GCF Call 2: y=215 -->
  <text x="495" y="228" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Call 2</text>
  <text x="575" y="228" fill="#67e8f9" font-family="system-ui,sans-serif" font-size="10">(bare refs for known, only new symbol is full)</text>
  <rect x="490" y="235" width="445" height="108" rx="4" fill="#0c2d3e" stroke="#18befc" stroke-width="1"/>
  <text x="502" y="255" fill="#67e8f9" font-family="ui-monospace,monospace" font-size="10">## symbols [1]{id,kind,qname,score,provenance}</text>
  <text x="502" y="273" fill="#e2e8f0" font-family="ui-monospace,monospace" font-size="10">@50|function|auth.revokeToken|0.88|definition</text>
  <text x="502" y="297" fill="#67e8f9" font-family="ui-monospace,monospace" font-size="10">## edges [2]{target,source,type}</text>
  <text x="502" y="315" fill="#e2e8f0" font-family="ui-monospace,monospace" font-size="10">@0&lt;@50|calls</text>
  <text x="502" y="333" fill="#e2e8f0" font-family="ui-monospace,monospace" font-size="10">@1&lt;@50|calls</text>
  <text x="640" y="315" fill="#18befc" font-family="system-ui,sans-serif" font-size="9" opacity="0.5">← bare refs, no retransmission</text>
  <text x="920" y="255" fill="#18befc" font-family="ui-monospace,monospace" font-size="10" text-anchor="end">420 tok</text>

  <!-- GCF Call 3: y=355 -->
  <text x="495" y="368" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Call 3</text>
  <text x="575" y="368" fill="#67e8f9" font-family="system-ui,sans-serif" font-size="10">(almost entirely bare references)</text>
  <rect x="490" y="375" width="445" height="56" rx="4" fill="#0c2d3e" stroke="#18befc" stroke-width="1"/>
  <text x="502" y="395" fill="#67e8f9" font-family="ui-monospace,monospace" font-size="10">## edges [1]{target,source,type}</text>
  <text x="502" y="413" fill="#e2e8f0" font-family="ui-monospace,monospace" font-size="10">@0&lt;@1|calls</text>
  <text x="640" y="413" fill="#18befc" font-family="system-ui,sans-serif" font-size="9" opacity="0.5">← all symbols already known</text>
  <text x="920" y="395" fill="#18befc" font-family="ui-monospace,monospace" font-size="10" text-anchor="end">96 tok</text>

  <!-- GCF Total -->
  <rect x="490" y="500" width="445" height="28" rx="4" fill="#0c2d3e" opacity="0.5"/>
  <text x="712" y="519" fill="#18befc" font-family="system-ui,sans-serif" font-size="13" font-weight="700" text-anchor="middle">Total: 1,716 tokens</text>

  <!-- ===== WHY IT WORKS ===== -->
  <rect x="25" y="550" width="910" height="70" rx="6" fill="#1a1a2e" stroke="#334155" stroke-width="1"/>
  <text x="480" y="574" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="12" font-weight="700" text-anchor="middle">Why JSON can't do this</text>
  <text x="480" y="592" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">JSON objects have no identity. There's no way to say "the same object I sent last time."</text>
  <text x="480" y="608" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">GCF's @id system gives every symbol a stable, content-addressed identifier that persists across calls.</text>

  <!-- ===== BOTTOM BAR ===== -->
  <rect x="25" y="640" width="910" height="50" rx="6" fill="#0c2d3e" stroke="#18befc" stroke-width="1"/>
  <rect x="180" y="652" width="150" height="26" rx="4" fill="#7f1d1d"/>
  <text x="255" y="670" fill="#fca5a5" font-family="ui-monospace,monospace" font-size="14" font-weight="700" text-anchor="middle">JSON: 9,000</text>
  <rect x="380" y="652" width="150" height="26" rx="4" fill="#164e63"/>
  <text x="455" y="670" fill="#67e8f9" font-family="ui-monospace,monospace" font-size="14" font-weight="700" text-anchor="middle">GCF: 1,716</text>
  <rect x="580" y="650" width="170" height="30" rx="6" fill="#18befc"/>
  <text x="665" y="671" fill="#0f172a" font-family="system-ui,sans-serif" font-size="16" font-weight="800" text-anchor="middle">81% savings</text>

  <!-- Footer -->
  <text x="480" y="720" fill="#64748b" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">By the 5th call in a session, token usage drops to 8% of JSON. No other format has session-level identity.</text>
  <text x="480" y="740" fill="#4ade80" font-family="system-ui,sans-serif" font-size="11" font-weight="600" text-anchor="middle">Generic profile: Layer 4 (53-71% savings). Graph profile: Layer 4 + Layer 3 (up to 97% by call 5).</text>
  <text x="480" y="795" fill="#334155" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">gcformat.com | blackwell-systems.com</text>
</svg>
