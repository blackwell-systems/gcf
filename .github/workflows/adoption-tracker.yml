name: Adoption Tracker
on:
  schedule:
    - cron: '0 9 * * *' # Every day at 9am UTC
  workflow_dispatch: # Manual trigger

permissions:
  issues: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - name: Search for external GCF usage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Search for references to any blackwell-systems repo (not just gcf).
          # GitHub code search limits to 5 requests/min, so we batch queries.
          QUERIES=(
            "blackwell-systems/gcf"
            "blackwell-systems/gcf-go"
            "blackwell-systems/gcf-typescript"
            "blackwell-systems/gcf-python"
            "blackwell-systems/gcf-rust"
            "blackwell-systems/gcf-swift"
            "blackwell-systems/gcf-kotlin"
            "blackwell-systems/gcf-proxy"
            "blackwell-systems/tree-sitter-gcf"
            "blackwell-systems/agent-lsp"
          )

          ALL_RESULTS="[]"
          for QUERY in "${QUERIES[@]}"; do
            ENCODED=$(python3 -c "import urllib.parse; print(urllib.parse.quote('\"${QUERY}\" NOT org:blackwell-systems'))")
            RESPONSE=$(gh api "search/code?q=${ENCODED}&per_page=50" 2>&1) || true

            # Skip non-JSON responses (rate limit returns HTML).
            if ! echo "$RESPONSE" | jq empty 2>/dev/null; then
              echo "Skipping query '${QUERY}': non-JSON response"
              continue
            fi

            ITEMS=$(echo "$RESPONSE" | jq '[.items[] | {repo: .repository.full_name, path: .path, url: .repository.html_url, stars: .repository.stargazers_count}]')
            ALL_RESULTS=$(echo "$ALL_RESULTS $ITEMS" | jq -s 'add')

            # Respect rate limit: 2s between queries.
            sleep 2
          done

          # Deduplicate by repo name, keep highest star count entry.
          RESULTS=$(echo "$ALL_RESULTS" | jq '[group_by(.repo)[] | sort_by(-.stars)[0]] | sort_by(-.stars)')
          COUNT=$(echo "$RESULTS" | jq length)

          if [ "$COUNT" -eq "0" ]; then
            echo "No external references found"
            exit 0
          fi

          # Compare against the most recent adoption issue by repo list.
          LAST_BODY=$(gh issue list --repo blackwell-systems/gcf --label adoption --limit 1 --json body --jq '.[0].body // ""')
          LAST_REPOS=$(echo "$LAST_BODY" | grep -oE '\[([^]]+)\]' | sed 's/\[//;s/\]//' | sort -u)
          NEW_REPOS=$(echo "$RESULTS" | jq -r '.[].repo' | sort -u)

          if [ -n "$LAST_REPOS" ] && [ "$LAST_REPOS" = "$NEW_REPOS" ]; then
            echo "No new references since last issue ($COUNT repos unchanged). Skipping."
            exit 0
          fi

          TODAY=$(date +%Y-%m-%d)
          BODY="## External References to blackwell-systems repos\n\n"
          BODY+="Found **$COUNT** unique repositories:\n\n"
          BODY+=$(echo "$RESULTS" | jq -r '.[] | "- [" + .repo + "](" + .url + ") (" + (.stars | tostring) + " ⭐) — `" + .path + "`"')
          BODY+="\n\n*Auto-generated by adoption-tracker workflow*"

          printf "$BODY" | gh issue create \
            --repo blackwell-systems/gcf \
            --title "Adoption tracker: $COUNT external references ($TODAY)" \
            --label adoption \
            --body-file -
