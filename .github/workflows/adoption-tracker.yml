name: Adoption Tracker
on:
  schedule:
    - cron: '0 9 * * *' # Every day at 9am UTC
  workflow_dispatch: # Manual trigger

permissions:
  issues: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - name: Search for external GCF usage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Query GitHub code search API with retry on rate limit.
          RESPONSE=$(gh api "search/code?q=%22blackwell-systems%2Fgcf%22+NOT+org%3Ablackwell-systems&per_page=50" 2>&1) || true

          # Check for valid JSON response (API may return HTML on rate limit).
          if ! echo "$RESPONSE" | jq empty 2>/dev/null; then
            echo "GitHub code search API returned non-JSON (likely rate limited). Skipping."
            exit 0
          fi

          RESULTS=$(echo "$RESPONSE" | jq '[.items[] | {repo: .repository.full_name, path: .path, url: .repository.html_url}] | unique_by(.repo)')

          COUNT=$(echo "$RESULTS" | jq length)

          if [ "$COUNT" -eq "0" ]; then
            echo "No external references found"
            exit 0
          fi

          # Build issue body
          BODY="## External GCF References\n\nFound $COUNT unique repositories referencing \`@blackwell-systems/gcf\`:\n\n"
          BODY+=$(echo "$RESULTS" | jq -r '.[] | "- [" + .repo + "](" + .url + ") — `" + .path + "`"')
          BODY+="\n\n*Auto-generated by adoption-tracker workflow*"

          # Check if issue already exists today
          TODAY=$(date +%Y-%m-%d)
          EXISTING=$(gh issue list --repo blackwell-systems/gcf --label adoption --search "$TODAY" --json number --jq length)

          if [ "$EXISTING" -gt "0" ]; then
            echo "Issue already exists for $TODAY"
            exit 0
          fi

          printf "$BODY" | gh issue create \
            --repo blackwell-systems/gcf \
            --title "Adoption tracker: $COUNT external references ($TODAY)" \
            --label adoption \
            --body-file -
