name: Adoption Tracker
on:
  schedule:
    - cron: '0 9 * * *' # Every day at 9am UTC
  workflow_dispatch: # Manual trigger

permissions:
  issues: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - name: Search for external GCF usage
        env:
          # Code search API requires a user PAT (GITHUB_TOKEN lacks permission).
          # Set GCF_TRACKER_TOKEN as a repository secret with 'public_repo' scope.
          GH_TOKEN: ${{ secrets.GCF_TRACKER_TOKEN || secrets.GITHUB_TOKEN }}
          ISSUE_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Search for any reference to blackwell-systems org (covers all repos).
          RESPONSE=$(gh api "search/code?q=%22blackwell-systems%22+NOT+org%3Ablackwell-systems&per_page=100" 2>&1) || true

          # Check for valid JSON response (API may return HTML on rate limit).
          if ! echo "$RESPONSE" | jq empty 2>/dev/null; then
            echo "GitHub code search API returned non-JSON (likely rate limited or missing PAT)."
            echo "Set GCF_TRACKER_TOKEN secret with a PAT that has public_repo scope."
            exit 0
          fi

          # Extract unique repos, deduplicate by repo name.
          RESULTS=$(echo "$RESPONSE" | jq '
            [.items[] | {repo: .repository.full_name, path: .path, url: .repository.html_url}]
            | group_by(.repo)
            | [.[] | sort_by(.path)[0]]
            | sort_by(.repo)
          ')

          COUNT=$(echo "$RESULTS" | jq length)

          if [ "$COUNT" -eq "0" ]; then
            echo "No external references found"
            exit 0
          fi

          echo "Found $COUNT unique repos referencing blackwell-systems"

          # Compare against the most recent adoption issue by repo list.
          GH_TOKEN="$ISSUE_TOKEN" gh issue list --repo blackwell-systems/gcf --label adoption --limit 1 --json body --jq '.[0].body // ""' > /tmp/last_issue.txt
          LAST_REPOS=$(grep -oE '\[[^]]+\]' /tmp/last_issue.txt | sed 's/^\[//;s/\]$//' | sort -u)
          NEW_REPOS=$(echo "$RESULTS" | jq -r '.[].repo' | sort -u)

          if [ -n "$LAST_REPOS" ] && [ "$LAST_REPOS" = "$NEW_REPOS" ]; then
            echo "No new references since last issue ($COUNT repos unchanged). Skipping."
            exit 0
          fi

          TODAY=$(date +%Y-%m-%d)
          {
            echo "## External References to blackwell-systems repos"
            echo ""
            echo "Found **$COUNT** unique repositories:"
            echo ""
            echo "$RESULTS" | jq -r '.[] | "- [" + .repo + "](" + .url + ") — `" + .path + "`"'
            echo ""
            echo "*Auto-generated by adoption-tracker workflow*"
          } > /tmp/issue_body.md

          GH_TOKEN="$ISSUE_TOKEN" gh issue create \
            --repo blackwell-systems/gcf \
            --title "Adoption tracker: $COUNT external references ($TODAY)" \
            --label adoption \
            --body-file /tmp/issue_body.md
