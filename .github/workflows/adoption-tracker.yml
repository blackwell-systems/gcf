name: Adoption Tracker
on:
  schedule:
    - cron: '0 9 * * *' # Every day at 9am UTC
  workflow_dispatch: # Manual trigger

permissions:
  issues: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - name: Search for external GCF usage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Search for any reference to blackwell-systems org (covers all repos).
          # Single query avoids rate limiting from multiple code search calls.
          RESPONSE=$(gh api "search/code?q=%22blackwell-systems%22+NOT+org%3Ablackwell-systems&per_page=100" 2>&1) || true

          # Check for valid JSON response (API may return HTML on rate limit).
          if ! echo "$RESPONSE" | jq empty 2>/dev/null; then
            echo "GitHub code search API returned non-JSON (likely rate limited). Skipping."
            exit 0
          fi

          # Extract unique repos with star count, deduplicate by repo name.
          RESULTS=$(echo "$RESPONSE" | jq '
            [.items[] | {repo: .repository.full_name, path: .path, url: .repository.html_url, stars: .repository.stargazers_count}]
            | group_by(.repo)
            | [.[] | sort_by(-.stars)[0]]
            | sort_by(-.stars)
          ')

          COUNT=$(echo "$RESULTS" | jq length)

          if [ "$COUNT" -eq "0" ]; then
            echo "No external references found"
            exit 0
          fi

          echo "Found $COUNT unique repos referencing blackwell-systems"

          # Compare against the most recent adoption issue by repo list.
          LAST_BODY=$(gh issue list --repo blackwell-systems/gcf --label adoption --limit 1 --json body --jq '.[0].body // ""')
          LAST_REPOS=$(echo "$LAST_BODY" | grep -oE '\[[^]]+\]' | sed 's/^\[//;s/\]$//' | sort -u)
          NEW_REPOS=$(echo "$RESULTS" | jq -r '.[].repo' | sort -u)

          if [ -n "$LAST_REPOS" ] && [ "$LAST_REPOS" = "$NEW_REPOS" ]; then
            echo "No new references since last issue ($COUNT repos unchanged). Skipping."
            exit 0
          fi

          TODAY=$(date +%Y-%m-%d)
          BODY="## External References to blackwell-systems repos\n\n"
          BODY+="Found **$COUNT** unique repositories:\n\n"
          BODY+=$(echo "$RESULTS" | jq -r '.[] | "- [" + .repo + "](" + .url + ") (" + (.stars | tostring) + " ⭐) — `" + .path + "`"')
          BODY+="\n\n*Auto-generated by adoption-tracker workflow*"

          printf "$BODY" | gh issue create \
            --repo blackwell-systems/gcf \
            --title "Adoption tracker: $COUNT external references ($TODAY)" \
            --label adoption \
            --body-file -
